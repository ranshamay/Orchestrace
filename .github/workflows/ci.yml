name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Collect changed files
        run: |
          mkdir -p .orchestrace
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null 2>&1; then
              git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .orchestrace/changed-files.txt
            else
              git diff --name-only "origin/${{ github.base_ref }}" HEAD > .orchestrace/changed-files.txt
            fi
          else
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              git diff --name-only HEAD^ HEAD > .orchestrace/changed-files.txt
            else
              git ls-files > .orchestrace/changed-files.txt
            fi
          fi

      - name: Eval gate
        run: pnpm evals:ci
