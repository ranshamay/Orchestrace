name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build UI
        run: pnpm --filter @orchestrace/ui build

      - name: Deploy UI to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/ui/dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=main

      - name: Setup SSH key for EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.AWS_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deploy script
        run: |
          scp infra/scripts/deploy-compute.sh "${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}:/tmp/deploy-compute.sh"

      - name: Deploy compute service on EC2
        env:
          AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
          AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_DEPLOY_TOKEN }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          if [ -n "$GITHUB_DEPLOY_TOKEN" ]; then
            REPO_URL="https://x-access-token:${GITHUB_DEPLOY_TOKEN}@github.com/${{ github.repository }}.git"
          fi
          ssh "$AWS_EC2_USER@$AWS_EC2_HOST" "chmod +x /tmp/deploy-compute.sh && GITHUB_REPOSITORY_URL='$REPO_URL' GITHUB_REF_NAME='${{ github.ref_name }}' ORCHESTRACE_PORT='4310' /tmp/deploy-compute.sh"
